<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - UniLib</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">📚 UniLib</div>
                <div class="nav-links"><a href="index.html">Home</a></div>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 20px;">Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email / Username</label>
                    <input type="text" id="username" placeholder="admin or student" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Any password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <p style="margin-top: 15px; font-size: 0.9rem;">
                Try <b>admin</b> / admin for Admin Panel.<br>
                Try <b>student</b> / 123 for Student Panel.
            </p>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.toLowerCase();
            
            // Simulating Backend Auth
            if (user === 'admin') {
                sessionStorage.setItem('lms_user', JSON.stringify({ name: 'Admin User', role: 'admin' }));
                window.location.href = 'admin.html';
            } else if (user === 'student') {
                sessionStorage.setItem('lms_user', JSON.stringify({ id: 101, name: 'John Doe', role: 'student' }));
                window.location.href = 'student.html';
            } else {
                alert('Invalid Credentials! Use "admin" or "student".');
            }
        });
    </script>
</body>
</html>
